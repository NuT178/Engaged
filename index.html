<!DOCTYPE html>
<html lang="km">
<head>
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>សំបុត្រអញ្ជើញភ្ជាប់ពាក្យ - KIMSOR & SOPHANNY</title>
    <meta name="description" content="យើងខ្ញុំសូមគោរពអញ្ជើញក្នុងកម្មវិធីភ្ជាប់ពាក្យ នៅថ្ងៃទី ២៩ មីនា ២០២៦">

    <meta property="og:type" content="website">
    <meta property="og:title" content="សំបុត្រអញ្ជើញភ្ជាប់ពាក្យ - MONG KIMSOR & PHAN SOPHANNY">
    <meta property="og:description" content="សូមគោរពអញ្ជើញភ្ញៀវកិត្តិយសចូលរួមជាអធិបតីក្នុងកម្មវិធីរបស់យើងខ្ញុំ">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta property="og:image" content="https://engaged-xi.vercel.app/og-image.jpg">
    <meta property="twitter:image" content="https://engaged-xi.vercel.app/og-image.jpg">
    
    <meta property="og:url" content="https://engaged-xi.vercel.app/">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="សំបុត្រអញ្ជើញភ្ជាប់ពាក្យ - KIMSOR & SOPHANNY">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Khmer+OS+Muol+Light&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-pink-100 flex items-center justify-center min-h-screen overflow-hidden">

    <div class="main-card relative w-full h-screen sm:h-[90vh] sm:max-w-[420px] sm:rounded-[40px] bg-white shadow-2xl overflow-hidden flex flex-col">
        
        <div class="arch-bg absolute inset-0"></div>

        <div class="relative z-10 flex-1 flex flex-col items-center text-center p-6 justify-between">
            
            <div class="w-full">
                <h2 class="khmer-muol text-[25px] sm:text-[25px] text-pink-700 mt-8 mb-6 tracking-widest uppercase">សិរីមង្គលពិធីភ្ជាប់ពាក្យ</h2>

                <div class="flex items-center justify-between w-full mb-7">
                    <div class="flex-1 px-1 text-center">
                    <!-- div សម្រាប់ដាក់លើ -->
                    <div class="mb-3">
                        <p class="text-[11px] text-pink-700 font-bold uppercase">(កូនប្រុស)</p>
                    </div>
                        <h1 class="khmer-muol text-[16px] sm:text-[18px] text-gray-800 leading-tight">ម៉ុង គឹមស័រ</h1>
                        <p class="text-[9px] text-pink-500 font-bold mt-1 uppercase">MONG KIMSOR</p>
                    </div>

                    <div class="mx-3">
                        <div class="w-14 h-14 ring-animate">
                        <img src="ring.png" alt="Engaged Ring" class="w-25 h-25 object-contain">
                        </div>
                    </div>

                    <div class="flex-1 px-1 text-center">
                    <!-- div សម្រាប់ដាក់លើ -->
                    <div class="mb-2">
                        <p class="text-[11px] text-pink-700 font-bold uppercase">(កូនស្រី)</p>
                    </div>
                        <h1 class="khmer-muol text-[16px] sm:text-[18px] text-gray-800 leading-tight">ផាន សុផាន់នី</h1>
                        <p class="text-[9px] text-pink-500 font-bold mt-1 uppercase">PHAN SOPHANNY</p>
                    </div>
                </div>

                <div class="mb-4">
                    <p class="khmer-muol text-[17px] text-pink-800 mb-1">សូមគោរពអញ្ជើញ</p>
                    <p id="guest-prefix" class="text-[13px] text-pink-800 mb-2"></p>
                    <h3 id="guest-name" class="khmer-muol text-xl text-orange-600">ភ្ញៀវកិត្តិយស</h3>
                </div>
            </div>

            <div class="flower-sway w-full flex justify-center py-2">
                <img src="couple.png" alt="Couple" class="w-40 sm:w-48 object-contain">
            </div>

            <div class="w-full mb-4">
                <div class="bg-pink-50/80 py-2 px-4 rounded-full border border-pink-200 mb-4 inline-block">
                    <p class="text-[13px] font-bold text-gray-700 italic">២៩ មីនា ២០២៦ | ៨:០០ ព្រឹក</p>
                </div>

                <div class="grid grid-cols-4 gap-2 w-full mb-6">
                    <div class="timer-box">
                        <span id="days" class="text-lg font-bold text-pink-700">00</span>
                        <small class="text-[9px] text-gray-500">ថ្ងៃ</small>
                    </div>
                    <div class="timer-box">
                        <span id="hours" class="text-lg font-bold text-pink-700">00</span>
                        <small class="text-[9px] text-gray-500">ម៉ោង</small>
                    </div>
                    <div class="timer-box">
                        <span id="minutes" class="text-lg font-bold text-pink-700">00</span>
                        <small class="text-[9px] text-gray-500">នាទី</small>
                    </div>
                    <div class="timer-box">
                        <span id="seconds" class="text-lg font-bold text-pink-700">00</span>
                        <small class="text-[9px] text-gray-500">វិនាទី</small>
                    </div>
                </div>

                <a href="https://maps.app.goo.gl/BSZxUDbvohwTi3DQ8" target="_blank" rel="noopener noreferrer" class="btn-map inline-block w-full sm:w-auto">
                    ទីតាំងកម្មវិធី
                </a>
            </div>
        </div>

        <div class="floating-flower f1">🌸</div>
        <div class="floating-flower f2">🌺</div>
        <div class="floating-flower f3">💮</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
